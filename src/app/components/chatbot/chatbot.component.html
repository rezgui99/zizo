<!-- Bouton flottant du chatbot -->
<div class="fixed bottom-6 right-6 z-50">
  <!-- Bouton d'ouverture/fermeture -->
  <button 
    (click)="toggleChat()" 
    class="w-14 h-14 bg-primary rounded-full shadow-lg hover:shadow-xl transition-all duration-300 flex items-center justify-center group"
    [class.rotate-180]="isOpen">
    <svg *ngIf="!isOpen" class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
    </svg>
    <svg *ngIf="isOpen" class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
    </svg>
  </button>

  <!-- Fenêtre de chat -->
  <div *ngIf="isOpen" 
       class="absolute bottom-16 right-0 w-96 h-96 bg-white rounded-lg shadow-2xl border border-gray-200 flex flex-col transform transition-all duration-300 ease-out">
    
    <!-- Header du chat -->
    <div class="bg-primary text-white p-4 rounded-t-lg flex justify-between items-center">
      <div class="flex items-center">
        <div class="w-8 h-8 bg-white bg-opacity-20 rounded-full flex items-center justify-center mr-3">
          🤖
        </div>
        <div>
          <h3 class="font-semibold">Assistant RH</h3>
          <p class="text-xs text-blue-100">En ligne</p>
        </div>
      </div>
      <div class="flex space-x-2">
        <button (click)="clearChat()" 
                class="text-white hover:text-blue-200 transition-colors duration-150"
                title="Effacer la conversation">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
          </svg>
        </button>
        <button (click)="toggleChat()" 
                class="text-white hover:text-blue-200 transition-colors duration-150"
                title="Fermer le chat">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Zone des messages -->
    <div #messagesContainer 
         class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
      
      <div *ngFor="let message of messages" 
           class="flex"
           [class.justify-end]="message.isUser">
        <div [class]="'max-w-xs lg:max-w-md px-4 py-2 rounded-lg shadow-sm ' + getMessageClass(message)">
          <div [innerHTML]="formatMessageText(message.text)"
               class="text-sm whitespace-pre-wrap"></div>
          
          <!-- Actions spéciales pour les recommandations d'employés -->
          <div *ngIf="message.type === 'employee-recommendation' && message.data?.recommendation" 
               class="mt-3 pt-3 border-t border-gray-200">
            <div class="flex space-x-2">
              <button (click)="viewEmployeeProfile(message.data.recommendation.employee.id)"
                      class="text-xs bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded">
                👤 Voir profil
              </button>
              <button (click)="startMatching(message.data.recommendation.employee.id)"
                      class="text-xs bg-green-500 hover:bg-green-600 text-white px-2 py-1 rounded">
                🎯 Lancer matching
              </button>
            </div>
          </div>
          
          <div class="text-xs opacity-70 mt-1">
            {{ message.timestamp | date:'HH:mm' }}
          </div>
        </div>
      </div>

      <!-- Indicateur de frappe -->
      <div *ngIf="isTyping" class="flex">
        <div class="bg-gray-200 px-4 py-2 rounded-lg shadow-sm">
          <div class="flex space-x-1">
            <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
            <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Suggestions rapides -->
    <div class="px-4 py-2 border-t border-gray-200 bg-white">
      <div class="flex flex-wrap gap-1 mb-2">
        <button (click)="currentMessage = 'Quel est le meilleur employé pour le poste de Développeur Full Stack ?'; sendMessage()"
                class="text-xs bg-blue-100 hover:bg-blue-200 text-blue-800 px-2 py-1 rounded transition-colors duration-150">
          💼 Meilleur candidat
        </button>
        <button (click)="currentMessage = 'Quelles formations recommandez-vous ?'; sendMessage()"
                class="text-xs bg-green-100 hover:bg-green-200 text-green-800 px-2 py-1 rounded transition-colors duration-150">
          🎓 Formations
        </button>
        <button (click)="currentMessage = 'Combien d\'employés dans l\'organisation ?'; sendMessage()"
                class="text-xs bg-yellow-100 hover:bg-yellow-200 text-yellow-800 px-2 py-1 rounded transition-colors duration-150">
          📊 Statistiques
        </button>
        <button (click)="currentMessage = 'Quels sont les postes disponibles ?'; sendMessage()"
                class="text-xs bg-purple-100 hover:bg-purple-200 text-purple-800 px-2 py-1 rounded transition-colors duration-150">
          📋 Postes
        </button>
      </div>
      
      <!-- Suggestions contextuelles basées sur les fiches de poste -->
      <div *ngIf="jobDescriptions.length > 0" class="mb-2">
        <p class="text-xs text-gray-500 mb-1">Suggestions pour vos postes :</p>
        <div class="flex flex-wrap gap-1">
          <button *ngFor="let job of jobDescriptions.slice(0, 3)" 
                  (click)="selectJobForMatching(job)"
                  class="text-xs bg-indigo-100 hover:bg-indigo-200 text-indigo-800 px-2 py-1 rounded transition-colors duration-150">
            🎯 {{ job.emploi }}
          </button>
        </div>
      </div>
    </div>

    <!-- Zone de saisie -->
    <div class="p-4 border-t border-gray-200 bg-white rounded-b-lg">
      <div class="flex space-x-2">
        <input #messageInput
               type="text" 
               [(ngModel)]="currentMessage"
               (keypress)="onKeyPress($event)"
               placeholder="Tapez votre message..."
               class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
               [disabled]="isTyping">
        <button (click)="sendMessage()" 
                [disabled]="!currentMessage.trim() || isTyping"
                class="bg-primary text-white px-4 py-2 rounded-md hover:bg-blue-700 transition-colors duration-150 disabled:opacity-50 disabled:cursor-not-allowed">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
